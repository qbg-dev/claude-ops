# ══════════════════════════════════════════════════════════════════
# control-plane.conf — Configuration for the harness control plane
# ══════════════════════════════════════════════════════════════════
# Sourced every tick — changes take effect immediately. No restart needed.
# All intervals are in seconds.
#
# DESIGN PRINCIPLE: Mechanical checks (process alive? file old?) use
# algorithmic thresholds. Judgment calls (is this stale? is this bloated?)
# are delegated to Claude agents — no hardcoded heuristics for those.

# ── Tick ──────────────────────────────────────────────────────────
TICK_INTERVAL=30                  # seconds between main loop iterations

# ── Liveness (are processes alive?) — mechanical ─────────────────
LIVENESS_INTERVAL=120             # seconds between liveness checks
LIVENESS_AUTO_RESTART=true        # auto-restart dead components?
LIVENESS_NOTIFY=true              # notify Warren on death/restart?
LIVENESS_MAX_RESTARTS=3           # give up after N restarts per component

# ── Readiness (is worker productive?) — mechanical ───────────────
READINESS_INTERVAL=300            # seconds between readiness checks
READINESS_DEGRADED_AFTER=1800     # seconds of no activity -> "degraded" (30min)
READINESS_ROTATE_AFTER=3600       # seconds of no activity -> force rotate (60min)
READINESS_NOTIFY_ON_DEGRADED=true # notify when agent marked degraded?

# ── Stuck detection (worker at prompt with tasks remaining) — mechanical
STUCK_INTERVAL=300                # seconds between stuck checks
STUCK_IDLE_POLLS_THRESHOLD=5      # consecutive idle polls before nudging
STUCK_NUDGE_MAX=3                 # nudges before escalating to rotate
STUCK_NUDGE_VIA=monitor           # "monitor" or "direct"

# ── Reconciliation (desired vs actual state) — mechanical ────────
RECONCILE_INTERVAL=600            # seconds between reconciliation passes
RECONCILE_ALL_DONE_ACTION=evolve  # "evolve" (trigger evolve-harness) or "deactivate" or "notify"
RECONCILE_IDLE_ACTION=nudge       # "nudge" or "ignore"

# ── Cost tracking — mechanical ───────────────────────────────────
COST_ALERT_THRESHOLD=50           # dollars per session before alerting
COST_NOTIFY=true                  # notify Warren on threshold breach?

# ── Commit reminder — mechanical ─────────────────────────────────
COMMIT_REMINDER_FILE_THRESHOLD=20 # modified files before warning
COMMIT_REMINDER_STALE_MIN=30      # minutes since last commit before warning

# ── Agent-backed sweeps (judgment delegated to Claude) ───────────
# Sweeps 01, 02, 04, 08 always spawn a Claude agent. Model, tools, and
# permissions are defined in ~/.harness/sweeps.d/permissions/{slug}.json
# (principle of least privilege). No config vars needed here.

# ── Sweeps (enable/disable individual sweeps) ────────────────────
SWEEP_ENABLED_01_CLAUDE_MD=true
SWEEP_ENABLED_02_FILE_INDEX=true
SWEEP_ENABLED_03_STALE_CLEANUP=true
SWEEP_ENABLED_04_PROGRESS_RECONCILE=true
SWEEP_ENABLED_05_COMMIT_REMINDER=true
SWEEP_ENABLED_07_DEAD_AGENT=true
SWEEP_ENABLED_08_META_REFLECT=true

# ── Project ──────────────────────────────────────────────────────
PROJECT_ROOT=/Users/wz/Desktop/zPersonalProjects/Wechat
