# control-plane.conf — Configuration for the boring control plane daemon.
# Sourced by scripts/control-plane.sh and sweeps.d/ scripts.
# Override any value by setting the env var before sourcing.

TICK_INTERVAL="${TICK_INTERVAL:-60}"
METRICS_MAX_SIZE_BYTES="${METRICS_MAX_SIZE_BYTES:-10485760}"     # 10 MB
SWEEP_LOG_MAX_SIZE_BYTES="${SWEEP_LOG_MAX_SIZE_BYTES:-5242880}"  # 5 MB
SPAWN_SWEEP_PERMISSION_MODE="${SPAWN_SWEEP_PERMISSION_MODE:-default}"
CONSECUTIVE_ERRORS_MAX="${CONSECUTIVE_ERRORS_MAX:-5}"
GC_SESSION_MAX_AGE_SEC="${GC_SESSION_MAX_AGE_SEC:-86400}"        # 24 h
