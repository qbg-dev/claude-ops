# claude-ops tmux bindings
# ========================
# These bindings are designed for multi-agent Claude Code development.
# They are sourced by your .tmux.conf via: source-file ~/.claude-ops/tmux/claude-ops.tmux.conf
#
# This file is APPEND-SAFE: it only adds bindings, never unbinds or overrides
# existing ones. If a binding conflicts with your existing config, the last
# definition wins (standard tmux behavior). The setup script handles conflicts.
#
# All bindings use the prefix key (default: C-b, many devs rebind to C-x or C-a).

# ── CORE: Settings required for claude-ops ────────────────────────
# These are non-negotiable for the fleet/watchdog system to work.

# Vi-style copy mode (required for pane label rendering)
setw -g mode-keys vi

# Mouse support (agent panes need click-to-focus)
set -g mouse on

# Per-pane border labels — shows pane target for agent orchestration
# WHY: The watchdog and fleet tools identify panes by their tmux target
# (session:window.pane). Border labels make this visible at a glance.
set -g pane-border-status bottom
set -g pane-border-format " #[fg=cyan]#{session_name}:#{window_index}.#{pane_index}#[default] #[fg=yellow,bold]#(cat /tmp/tmux_pane_status_#{pane_id} 2>/dev/null)#[default] #{pane_title} "

# Status bar — harness summary in the left section
# WHY: Shows at-a-glance worker count and status. The script is fast (<10ms).
set-option -g status-interval 5
set-option -g status-left-length 80

# Window activity monitoring — see which worker panes have new output
setw -g monitor-activity on
set -g visual-activity off

# Large scrollback — agent sessions produce lots of output
set -g history-limit 50000

# Fast escape — critical for smooth scrolling and editor integration
set -sg escape-time 10

# Focus events — better editor integration (neovim, etc.)
set -g focus-events on

# Clipboard integration (OSC 52)
set -g set-clipboard on

# Aggressive resize — reflow immediately when panes resize
set -g aggressive-resize on

# ── RECOMMENDED: Navigation bindings ──────────────────────────────
# These make managing multiple agent panes fast and intuitive.
# All are adjustable — the setup script will skip any that conflict
# with your existing bindings.

# Vim-style pane navigation (prefix + h/j/k/l)
# WHY: With 5-10 agent panes, arrow keys are too slow. Vim motions
# let you jump to any pane without reaching for arrows.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Vim-style pane splitting (prefix + v/s)
# WHY: Consistent with vim's :vsplit/:split. Preserves current path
# so new panes start in the same directory.
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# Cycle panes while preserving zoom (prefix + n/N)
# WHY: When zoomed into one agent, n/N lets you flip through agents
# without losing the zoomed view — essential for monitoring.
bind -r n select-pane -t :.+ \; resize-pane -Z
bind -r N select-pane -t :.- \; resize-pane -Z

# Layout presets (prefix + H/V/T/=)
# WHY: Quickly reorganize agents into tiled, horizontal, or vertical layouts.
bind-key H select-layout even-horizontal
bind-key V select-layout even-vertical
bind-key T select-layout tiled
bind-key = select-layout main-vertical

# Window navigation (prefix + space/bspace)
bind-key space next-window
bind-key bspace previous-window

# Quick config reload
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Kill pane (prefix + K) — re-zooms if zoomed
bind-key K if-shell "[ #{window_zoomed_flag} -eq 1 ]" "kill-pane; resize-pane -Z" "kill-pane"

# Copy mode (prefix + x) and paste (prefix + p)
bind-key x copy-mode
bind-key p paste-buffer

# ── CLAUDE-OPS: Agent-specific bindings ───────────────────────────
# These are specific to the claude-ops worker fleet system.

# Copy Claude resume/fork command (prefix + y/Y)
# WHY: y copies a `claude -r <session>` command to clipboard for resuming.
# Y copies a fork command with --name at the end for easy editing.
# Paste into a new pane to resume or fork the agent session.
bind-key y run-shell "bash ~/.claude/scripts/copy-resume-cmd.sh --no-fork #{pane_id}"
bind-key Y run-shell "bash ~/.claude/scripts/copy-resume-cmd.sh #{pane_id}"

# Fork + run in one step (prefix + X)
# WHY: Combines Y (copy fork cmd) + v (split) + paste + Enter.
# One keypress to fork any agent into a sibling.
bind-key X run-shell "bash ~/.claude/scripts/copy-resume-cmd.sh #{pane_id}" \; split-window -h -c "#{pane_current_path}" \; run-shell 'tmux set-buffer -- "$(pbpaste)"' \; paste-buffer \; send-keys Enter

# Copy pane target to clipboard (prefix + P)
# WHY: Pane targets like "main:2.3" are used by monitor-agent and fleet tools.
bind-key P run-shell "echo -n '#{session_name}:#{window_index}.#{pane_index}' | pbcopy && tmux display-message 'Copied: #{session_name}:#{window_index}.#{pane_index}'"

# Move pane to background session (prefix + b)
# WHY: Send a finished or idle agent to a background session to declutter.
bind-key b run-shell "bash ~/.claude-ops/scripts/move-to-bg.sh '#{pane_id}'"

# Cycle active workers (prefix + a)
# WHY: Jump between only the panes running active Claude agents, skipping
# idle shells. Much faster than cycling all panes.
bind-key a run-shell "bash ~/.claude-ops/scripts/tmux-cycle-active-worker.sh"

# Harness status popup (prefix + i)
# WHY: Quick popup showing all active harnesses and their status.
bind-key i display-popup -w 60 -h 15 -E "echo '=== Active Harnesses ===' && cat /tmp/tmux_harness_details 2>/dev/null && echo && echo 'Press Enter to close' && read"

# Synchronize panes toggle (prefix + S)
# WHY: Type the same command in all panes at once. Useful for fleet-wide ops.
bind-key S setw synchronize-panes \; display-message "Pane sync: #{?pane_synchronized,ON,OFF}"
