# terminal.tmux.conf - Color, underline, and terminal capabilities
# Sourced from ~/.tmux.conf

# Use custom tmux-256color with underline capabilities
# NOTE: Requires custom terminfo at ~/.terminfo/74/tmux-256color
set -g default-terminal "tmux-256color"

# Enable RGB/true color support (24-bit color)
set -as terminal-features ",*:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable underline styles: single, double, wavy, dotted, dashed
# Smulx = CSI 4 : style m (where style: 1=single, 2=double, 3=wavy, 4=dotted, 5=dashed)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Enable colored underlines (sp attribute in Neovim)
# Setulc = CSI 58 : 2 : R : G : B m (RGB color for underline)
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable underline style feature detection
set -as terminal-features ',*:usstyle'
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',screen-256color:RGB'
