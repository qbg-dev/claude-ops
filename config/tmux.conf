# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  claude-fleet tmux.conf — agent-optimized tmux configuration           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# Install:  fleet setup              (auto-installs if no existing tmux.conf)
# Help:     fleet onboard            (architect will help merge with existing config)
# Reload:   prefix R                 (or: tmux source-file ~/.tmux.conf)
#
# Quick reference:
#   Prefix:   C-x
#   Navigate: prefix w/t (tree), prefix h/j/k/l (vim-style panes)
#   Windows:  prefix space/bspace (next/prev), prefix c (new)
#   Panes:    prefix v/s (split h/v), prefix K (kill), prefix n/N (cycle+zoom)
#   Copy:     prefix x (enter copy mode), v (select), y (copy)
#   Fleet:    prefix B (broadcast menu), prefix E (broadcast Enter)
#             prefix P (copy pane target), prefix m (monitor agent)

# ═══════════════════════════════════════════════════════════════════════════
# ═══ ESSENTIALS (no external dependencies) ════════════════════════════════
# ═══════════════════════════════════════════════════════════════════════════

# ── Core settings ─────────────────────────────────────────────────────────

# Prefix key
unbind C-b
unbind -T root C-b
unbind -T off C-b
set -g prefix C-x
bind C-x send-prefix

# Base window indexing starts at 1
set -g base-index 1

# Terminal color support
set-option -g default-terminal screen-256color

# Disable auto-rename (picks up runtime version strings — useless)
set-option -g automatic-rename off
set-option -gw allow-rename on

# Disable repeat time — allow arrow keys immediately after window switch
set-option -g repeat-time 0

# Disable assume-paste-time for iTerm2 "Send Hex Codes" compatibility
set-option -g assume-paste-time 0

# Default shell command
set-option -g default-command "$SHELL"

# Store tmux version for compatibility checks
run-shell "tmux setenv -g TMUX_VERSION $(tmux -V | cut -c 6-)"

# ── Performance ───────────────────────────────────────────────────────────

# Fast escape (critical for smooth scrolling and editor responsiveness)
set -sg escape-time 10

# 50k scrollback — agents produce a LOT of output
set -g history-limit 50000

# Focus events for better editor integration
set -g focus-events on

# Clipboard integration (OSC 52)
set -g set-clipboard on

# Force immediate reflow on pane resize
set -g aggressive-resize on

# ── Mouse support ─────────────────────────────────────────────────────────

set -g mouse on

# Mousewheel/trackpad scrolling
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"

# ── Window management ────────────────────────────────────────────────────

# Navigation
bind-key space next-window
bind-key bspace previous-window
bind-key a next-window
bind-key A previous-window
bind-key enter next-layout

# Creation and selection
bind-key c new-window
bind-key t choose-tree -Zs

# Config reload
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Command prompt and utilities
bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history
bind-key q display-panes

# Display panes timeout
set-window-option -g display-panes-time 1500

# ── Pane management ──────────────────────────────────────────────────────

# Vim-style splits (preserve current path)
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Cycle panes while preserving zoom state
bind -r n select-pane -t :.+ \; resize-pane -Z
bind -r N select-pane -t :.- \; resize-pane -Z

# Quick pane switching
bind-key ' ' last-pane

# Layout management
bind-key H select-layout even-horizontal
bind-key V select-layout even-vertical
bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical
bind-key T select-layout tiled
bind-key C-o rotate-window

# Kill current pane — if zoomed, re-zoom on next pane
bind-key K if-shell "[ #{window_zoomed_flag} -eq 1 ]" "kill-pane; resize-pane -Z" "kill-pane"

# Synchronize panes toggle
bind-key S setw synchronize-panes \; display-message "Pane sync: #{13:13pane_synchronized,ON,OFF}"

# Main pane dimensions for main-horizontal/vertical layouts
set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80

# Move pane to next/previous window (creates window if needed)
bind-key M run-shell 'if [ $(tmux display-message -p "#{window_panes}") -gt 1 ]; then tmux join-pane -d -t :+ 2>/dev/null || tmux break-pane -d; else tmux join-pane -t :+ 2>/dev/null || tmux break-pane; fi'
bind-key < run-shell 'if [ $(tmux display-message -p "#{window_panes}") -gt 1 ]; then tmux join-pane -d -t :- 2>/dev/null || tmux break-pane -d -b; else tmux join-pane -t :- 2>/dev/null || tmux break-pane -b; fi'

# Smart pane switching with vim awareness
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-l) || tmux select-pane -R"
bind -n 'C-\' run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys 'C-\') || tmux select-pane -l"
bind C-l send-keys 'C-l'

# ── Copy mode & clipboard ────────────────────────────────────────────────

# Vi-style copy mode
setw -g mode-keys vi

# Enter copy mode with 'x', paste with 'p'
bind-key x copy-mode
bind-key p paste-buffer

# Vi-style selection and copy (pbcopy on macOS, xclip/xsel on Linux)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse drag to copy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Copy-on-select: highlight and release to copy
set -g @yank_selection_mouse 'clipboard'
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel "pbcopy"

# Rectangle selection (Ctrl+R in copy mode)
bind-key -T copy-mode-vi C-r send-keys -X rectangle-toggle

# ── Status bar & appearance ──────────────────────────────────────────────

set-option -g status-interval 5
set-option -g status-left "#[fg=cyan][#S]#[default] #{?window_zoomed_flag,#[fg=red,bold][Z] #[default],}#{?pane_synchronized,#[fg=magenta][SYNC] #[default],}#{?client_prefix,#[fg=green][PREFIX] #[default],}#(bash ~/.claude-fleet/scripts/tmux-fleet-status.sh 2>/dev/null)"
set-option -g status-left-length 200
set-option -g status-right "%l:%M%p"

# Window status styling
set-window-option -g window-status-current-style fg=magenta
set-option -g status-style fg=default

# Solarized Dark (default)
set-option -g status-style bg=black
set-option -g pane-active-border-style fg=colour215,bold
set-option -g pane-border-style fg=colour238

# Change active border color when zoomed (red = zoomed, gold = normal)
set-hook -g after-resize-pane "if-shell -F '#{window_zoomed_flag}' 'set -w pane-active-border-style fg=red,bold' 'set -w pane-active-border-style fg=colour215,bold'"

# Per-pane labels in borders — shows pane target for agent orchestration
set -g pane-border-status bottom
set -g pane-border-format " #[fg=cyan]#{session_name}:#{window_index}.#{pane_index}#[default] #[fg=yellow,bold]#(cat /tmp/tmux_pane_status_#{pane_id} 2>/dev/null)#[default] #{pane_title} "

# Solarized Light auto-detect
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g status-style bg=white"
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g pane-active-border-style fg=colour215,bold"
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g pane-border-style fg=colour250"

# Activity indicators
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-format " #{?window_activity_flag,#[fg=yellow]●#[default] ,  }#I:#W#{?window_zoomed_flag, [Z],} "
setw -g window-status-current-format " #[fg=green,bold]▶ #I:#W#{?window_zoomed_flag, [Z],}#[default] "

# Unbind Shift+Enter to prevent accidental pane switching
unbind -n S-Enter

# ═══════════════════════════════════════════════════════════════════════════
# ═══ FLEET AGENT TOOLS (gracefully degrade if scripts missing) ═══════════
# ═══════════════════════════════════════════════════════════════════════════

# Fleet scripts live at ~/.claude-fleet/scripts/ (symlink created by fleet setup)

# Broadcast menu (prefix B) — text, enter, esc to panes
if-shell "[ -f $HOME/.claude-fleet/scripts/broadcast.sh ]" {
  bind B display-menu -T "Broadcast" \
    "Text → All panes"       a "run-shell 'bash $HOME/.claude-fleet/scripts/broadcast.sh text all'" \
    "Text → Current window"  w "run-shell 'bash $HOME/.claude-fleet/scripts/broadcast.sh text window'" \
    "Text → Select windows"  s "run-shell 'bash $HOME/.claude-fleet/scripts/broadcast.sh text select'" \
    "" \
    "Enter → All panes"      e "run-shell 'bash $HOME/.claude-fleet/scripts/broadcast.sh enter all'" \
    "Enter → Current window" E "run-shell 'bash $HOME/.claude-fleet/scripts/broadcast.sh enter window'" \
    "" \
    "Esc → All panes"        x "run-shell 'bash $HOME/.claude-fleet/scripts/broadcast.sh esc all'" \
    "Esc → Current window"   X "run-shell 'bash $HOME/.claude-fleet/scripts/broadcast.sh esc window'" \
    "" \
    "Chain → All panes"      c "display-popup -E -w 60 -h 7 -- bash $HOME/.claude-fleet/scripts/broadcast-chain.sh all" \
    "Chain → Current window" C "display-popup -E -w 60 -h 7 -- bash $HOME/.claude-fleet/scripts/broadcast-chain.sh window"

  # Broadcast Enter (prefix E) — submit typed text in ALL panes
  bind E run-shell 'bash $HOME/.claude-fleet/scripts/broadcast.sh enter all'
}

# Copy pane target to clipboard (prefix P)
bind-key P run-shell "echo -n '#{session_name}:#{window_index}.#{pane_index}' | pbcopy && tmux display-message 'Copied: #{session_name}:#{window_index}.#{pane_index}'"

# Harness status popup (prefix i)
bind-key i display-popup -w 60 -h 15 -E "echo '=== Active Harnesses ===' && cat /tmp/tmux_harness_details 2>/dev/null && echo && echo 'Press Enter to close' && read"

# Copy Claude resume cmd (prefix y = plain, prefix Y = fork session)
if-shell "[ -f ~/.claude/scripts/copy-resume-cmd.sh ]" {
  bind-key y run-shell "bash ~/.claude/scripts/copy-resume-cmd.sh --no-fork #{pane_id}"
  bind-key Y run-shell "bash ~/.claude/scripts/copy-resume-cmd.sh #{pane_id}"
}

# Monitor agent (prefix m — prompts for target pane)
if-shell "[ -f ~/.claude/scripts/monitor-agent.sh ]" {
  bind-key m command-prompt -p "Monitor pane:" "run-shell 'bash ~/.claude/scripts/monitor-agent.sh %1'"
}

# Move pane to background session (prefix b)
if-shell "[ -f ~/.claude-ops/scripts/move-to-bg.sh ]" {
  bind-key b run-shell "bash ~/.claude-ops/scripts/move-to-bg.sh '#{pane_id}'"
}

# Fork session: copy resume cmd, split, paste & run (prefix X)
if-shell "[ -f ~/.claude/scripts/copy-resume-cmd.sh ]" {
  bind-key X run-shell "bash ~/.claude/scripts/copy-resume-cmd.sh #{pane_id}" \; split-window -h -c "#{pane_current_path}" \; run-shell 'tmux set-buffer -- "$(pbpaste)"' \; paste-buffer \; send-keys Enter
}

# ═══════════════════════════════════════════════════════════════════════════
# ═══ OPTIONAL: TERMINAL ENHANCEMENTS ═════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════════════

# True color / RGB support
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

# Colored underlines (for nvim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -as terminal-features ',*:usstyle'
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',screen-256color:RGB'

# ═══════════════════════════════════════════════════════════════════════════
# ═══ OPTIONAL: PLUGINS (TPM) ═════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════════════

# These plugins are optional — TPM must be installed for them to load.
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'

# Save/restore sessions across reboots (prefix + Ctrl-s / Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'

# Auto-save sessions every 15 min + auto-restore on tmux start
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Fuzzy finder for sessions/windows/panes (prefix + F)
set -g @plugin 'tmux-plugins/tmux-fzf'

# Initialize TPM — gracefully skip if not installed
if-shell "[ -d ~/.tmux/plugins/tpm ]" "run '~/.tmux/plugins/tpm/tpm'"
