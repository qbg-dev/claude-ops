name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test cli/tests/
      - run: bun test mcp/worker-fleet/
      - run: bun build mcp/worker-fleet/index.ts --outfile /tmp/check.js --target bun
