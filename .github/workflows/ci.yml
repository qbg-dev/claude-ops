name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: boring

      - name: Install dependencies
        run: sudo apt-get install -y jq tmux

      - name: Install boring to ~/.boring
        run: |
          mkdir -p ~/.boring
          cp -r boring/. ~/.boring/
          mkdir -p ~/.boring/state/locks ~/.boring/bus/side-effects
          mkdir -p ~/.boring/harness/manifests ~/.boring/harness/reports

      - name: Run test suite
        run: bash ~/.boring/tests/run-all.sh

      - name: Run minimal-harness example
        run: |
          cd boring
          bash examples/minimal-harness/run.sh

      - name: Run multi-agent example
        run: |
          cd boring
          bash examples/multi-agent/run.sh
