# ┌──────────────────────────────────────────────────────────────────────────┐
# │                             CORE SETTINGS                                 │
# └──────────────────────────────────────────────────────────────────────────┘

# Prefix key
unbind C-b
unbind -T root C-b
unbind -T off C-b
set -g prefix C-x
bind C-x send-prefix

# Base window indexing starts at 1
set -g base-index 1

# Terminal color support (overridden by terminal.tmux.conf if present)
set-option -g default-terminal screen-256color

# Disable auto-rename (picks up Bun version "2.1.50" — useless)
set-option -g automatic-rename off
set-option -gw allow-rename on

# Disable repeat time — allow arrow keys immediately after changing windows
set-option -g repeat-time 0

# Disable assume-paste-time for iTerm2 "Send Hex Codes" compatibility
set-option -g assume-paste-time 0

# Default shell command
set-option -g default-command "$SHELL"

# Store tmux version for compatibility checks
run-shell "tmux setenv -g TMUX_VERSION $(tmux -V | cut -c 6-)"

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                       WINDOW & PANE BASICS                                │
# └──────────────────────────────────────────────────────────────────────────┘

# Window creation
bind-key c new-window
bind-key t choose-tree -Zs
bind-key enter next-layout

# Command prompt and utilities
bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history
bind-key q display-panes

# Display panes timeout
set-window-option -g display-panes-time 1500

# Quick pane switching
bind-key ' ' last-pane

# Move pane to next/previous window (creates window if needed)
bind-key M run-shell 'if [ $(tmux display-message -p "#{window_panes}") -gt 1 ]; then tmux join-pane -d -t :+ 2>/dev/null || tmux break-pane -d; else tmux join-pane -t :+ 2>/dev/null || tmux break-pane; fi'
bind-key < run-shell 'if [ $(tmux display-message -p "#{window_panes}") -gt 1 ]; then tmux join-pane -d -t :- 2>/dev/null || tmux break-pane -d -b; else tmux join-pane -t :- 2>/dev/null || tmux break-pane -b; fi'

# Smart pane switching with vim awareness
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-l) || tmux select-pane -R"
bind -n 'C-\' run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys 'C-\') || tmux select-pane -l"
bind C-l send-keys 'C-l'

# Main pane dimensions for main-horizontal/vertical layouts
set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                        COPY MODE & CLIPBOARD                              │
# └──────────────────────────────────────────────────────────────────────────┘

# Vi-style copy mode
setw -g mode-keys vi

# Vi-style selection and copy (macOS pbcopy integration)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse drag to copy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Automatic copy on mouse selection
set -g @yank_selection_mouse 'clipboard'
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel "pbcopy"

# Rectangle selection (Ctrl+R in copy mode)
bind-key -T copy-mode-vi C-r send-keys -X rectangle-toggle

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                         STATUS BAR & APPEARANCE                           │
# └──────────────────────────────────────────────────────────────────────────┘

# Status bar — consolidated left, minimal right
set-option -g status-interval 5
set-option -g status-left "#[fg=cyan][#S]#[default] #{?window_zoomed_flag,#[fg=red,bold][Z] #[default],}#{?pane_synchronized,#[fg=magenta][SYNC] #[default],}#{?client_prefix,#[fg=green][PREFIX] #[default],}#[fg=colour215]#(bash ~/.claude-ops/scripts/tmux-harness-summary.sh 2>/dev/null)#[default] "
set-option -g status-left-length 80
set-option -g status-right "%l:%M%p"

# Window status styling
set-window-option -g window-status-current-style fg=magenta
set-option -g status-style fg=default

# Color scheme: Solarized Dark
set-option -g status-style bg=black
set-option -g pane-active-border-style fg=colour215,bold
set-option -g pane-border-style fg=colour238

# Change active border color when zoomed (red = zoomed, gold = normal)
set-hook -g after-resize-pane "if-shell -F '#{window_zoomed_flag}' 'set -w pane-active-border-style fg=red,bold' 'set -w pane-active-border-style fg=colour215,bold'"

# Solarized Light auto-detect
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g status-style bg=white"
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g pane-active-border-style fg=colour215,bold"
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g pane-border-style fg=colour250"

# Activity indicators
setw -g window-status-format " #{?window_activity_flag,#[fg=yellow]●#[default] ,  }#I:#W#{?window_zoomed_flag, [Z],} "
setw -g window-status-current-format " #[fg=green,bold]▶ #I:#W#{?window_zoomed_flag, [Z],}#[default] "

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                            MOUSE SUPPORT                                  │
# └──────────────────────────────────────────────────────────────────────────┘

# Mousewheel/trackpad scrolling fix
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"

# Unbind Shift+Enter to prevent accidental pane switching
unbind -n S-Enter

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                              PLUGINS (TPM)                                │
# └──────────────────────────────────────────────────────────────────────────┘

set -g @plugin 'tmux-plugins/tpm'

# Save/restore sessions across reboots (prefix + Ctrl-s / Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'

# Auto-save sessions every 15 min + auto-restore on tmux start
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Fuzzy finder for sessions/windows/panes (prefix + F)
set -g @plugin 'tmux-plugins/tmux-fzf'

# Initialize TPM (MUST be before source-files that add bindings)
run '~/.tmux/plugins/tpm/tpm'

# ┌──────────────────────────────────────────────────────────────────────────┐
# │                          MODULE SOURCES                                   │
# │  All navigation, agent, and feature bindings live in modules.             │
# │  Edit the module files, not this file.                                    │
# └──────────────────────────────────────────────────────────────────────────┘

# Terminal capabilities (RGB, colored underlines, terminfo)
source-file ~/.claude-ops/tmux/terminal.tmux.conf

# 9-level navigation system
source-file ~/.claude-ops/tmux/multilevel.tmux.conf

# claude-ops: navigation, agent bindings, fleet tools (MUST be last)
source-file ~/.claude-ops/tmux/claude-ops.tmux.conf
